<div class="grid grid-cols-1 lg:grid-cols-12 h-full">
  <main class="lg:col-span-8 bg-gray-50 p-6 overflow-y-auto -mb-6">

    @if(products$ | async) {

      <app-deposit-section></app-deposit-section>

      @if(categories$ | async; as categories){
        @for(category of categories; track category){
          <app-product-category-section
            [categoryTitle]="category | categoryDisplay"
            [products]="productService.getProductsByCategory(category)"
            [longPressEnabled]="category === 'SHOTS'"
            class="col-span-8"/>
        }
      }
    } @else {
      <span class="font-extrabold">BACKEND LÄDT ...</span>
      <img src="jaeger-exit.png" alt="das wars">
    }
  </main>

  <aside class="lg:col-span-4 bg-white border-l p-6 overflow-y-auto">
    <div class="h-full overflow-y-auto">
      <app-order-summary/>
      <div class="flex gap-3 pt-2 pb-1">
        <button matButton
          [disabled]="isOrderEmpty()"
          class="!bg-rotaract-cranberry !text-white !rounded-lg flex-1 !py-3 !text-base !font-bold transition-opacity"
          [class.opacity-35]="isOrderEmpty()"
          [class.cursor-not-allowed]="isOrderEmpty()"
          (click)="onSendOrder('CASH')">
          💵 BAR
        </button>
        <button matButton
          [disabled]="isOrderEmpty()"
          class="!bg-[#009cde] !text-white !rounded-lg flex-1 !py-3 !text-base !font-bold transition-opacity"
          [class.opacity-35]="isOrderEmpty()"
          [class.cursor-not-allowed]="isOrderEmpty()"
          (click)="onSendOrder('PAYPAL')">
          🅿 PAYPAL
        </button>
      </div>
      <div class="flex justify-center pt-3">
        <button matButton class="!bg-white !border-1 !border-b-rotaract-cranberry !rounded-lg w-full" (click)="orderService.clearOrder()">ALLES LÖSCHEN</button>
      </div>
      </div>
  </aside>

</div>
