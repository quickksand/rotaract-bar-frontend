<section class="mb-8">
  <h2 class="text-xl font-bold pb-4">🥤 PFAND</h2>

  <div class="flex items-center gap-4 p-3 bg-gray-50 rounded-lg">

    <!-- ZURÜCK Button -->
    <button class="flex-1 bg-white border-2 border-gray-300 rounded-lg p-3
                   hover:border-rotaract-cranberry transition-colors relative"
            (click)="returnCup()">

      <!-- Badge für Anzahl -->
      @if((orderService.returnedCupsCount$ | async)! > 0) {
        <div class="absolute -top-2 -right-2 bg-rotaract-cranberry text-white
                    rounded-full w-6 h-6 flex items-center justify-center text-sm font-bold">
          {{ orderService.returnedCupsCount$ | async }}
        </div>
      }

      <div class="text-center">
        <div class="font-bold text-brand-charcoal">ZURÜCK</div>
        <div class="text-sm text-gray-600">+2€ je Becher</div>
      </div>
    </button>

    <!-- Guthaben Display -->
    @if((orderService.creditBalance$ | async)! > 0) {
      <div class="bg-green-100 px-4 py-3 rounded-lg">
        <div class="text-sm text-green-700">Guthaben</div>
        <div class="font-bold text-green-800">
          {{ orderService.creditBalance$ | async | currency:'EUR':'symbol':'1.2-2':'de' }}
        </div>
      </div>
    }
  </div>
</section>
