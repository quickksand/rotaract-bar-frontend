<h1 class="text-2xl font-bold pb-5">{{categoryTitle()}}</h1>
<div class="grid grid-cols-2 lg:grid-cols-3 gap-4 p-4">

  @for (product of products(); track product.id) {
    <mat-card class="p-3 h-32" appearance="outlined">
      <div class="flex flex-col h-full">
        <div class="flex-shrink-0 mb-2">
          <h3 class="font-bold text-xl truncate">{{ product.name }}</h3>
          <p class="text-rotaract-cranberry font-bold text-sm">{{ product.price | currency : 'EUR' : "symbol" : '1.2-2': 'de'}}</p>
        </div>

  <!--      <mat-card-header>-->
  <!--        <mat-card-title>{{product.name}}</mat-card-title>-->

  <!--      </mat-card-header>-->

        <div class="flex-1 flex items-end">
          @if(orderService.getQuantity(product.id) === 0) {
            <button class="w-full bg-rotaract-cranberry text-white py-2 rounded text-sm font-bold"
                    (click)="orderService.addToOrder(product.id!)">
              + HINZUFÜGEN
            </button>
          } @else {
            <div class="flex items-center justify-between w-full">
              <button class="w-8 h-8 bg-rotary-azure text-white rounded font-bold">−</button>
              <span class="font-bold text-lg">{{ orderService.getQuantity(product.id) }}</span>
              <button class="w-8 h-8 bg-rotaract-cranberry text-white rounded font-bold"
                      (click)="orderService.addToOrder(product.id!)">+</button>
            </div>
          }
