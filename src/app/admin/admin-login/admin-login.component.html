<div class="flex h-full items-center justify-center">
  <div class="w-full max-w-sm p-8 rounded-xl shadow-md border border-gray-200">
    <h1 class="text-xl font-bold mb-6 text-center">Admin-Zugang</h1>

    <form (ngSubmit)="submit()" #form="ngForm" class="flex flex-col gap-4">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>PIN</mat-label>
        <input
          matInput
          type="password"
          inputmode="numeric"
          [(ngModel)]="pin"
          name="pin"
          required
          autocomplete="off"
        />
        @if (error()) {
          <mat-error>Falscher PIN</mat-error>
        }
      </mat-form-field>

      <button mat-flat-button type="submit" [disabled]="!pin">Anmelden</button>
    </form>
  </div>
</div>
