<div class="grid grid-cols-1 lg:grid-cols-12 h-screen">

  <main class="lg:col-span-8 bg-gray-50 p-6 overflow-y-auto">
    <div class="text-center">
      <h1 class="text-3xl font-bold underline decoration-rotaract-cranberry pb-6">Rotaract Bar System</h1>
    </div>
    <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 p-4">
      @if(products$ | async; as products) {
        @for (product of products; track product.id) {
            <mat-card class="p-4 min-h-[200px]" appearance="outlined">
              <mat-card-header>
                <mat-card-title>{{product.name}}</mat-card-title>
                <mat-card-subtitle>{{ product.price | currency : 'EUR' : "symbol" : '1.2-2': 'de' }}</mat-card-subtitle>

                <!-- Quantity Badge (oben rechts) -->
<!--                @if(orderService.getQuantity(product.id!) > 0) {-->
<!--                  <div class="flex justify-end">-->
<!--                    <span class="bg-rotaract-cranberry text-white px-3 py-1 rounded-full text-sm font-bold">-->
<!--                      {{orderService.getQuantity(product.id!)}}x-->
<!--                    </span>-->
<!--                  </div>-->
<!--                }-->

              </mat-card-header>

              <mat-card-content class="mt-4">



                <!-- State 1: Noch nicht bestellt (Quantity = 0) -->
                <!-- State 2: Bereits bestellt (Quantity > 0) -->
                @if(orderService.getQuantity(product.id!) === 0) {
                  <button
                    class="w-full bg-white py-4 rounded-lg font-bold border-1 border-rotaract-cranberry text-lg hover:bg-rotaract-cranberry/90 transition-colors"
                    (click)="orderService.addToOrder(product.id!)">
                    + HINZUFÜGEN
                  </button>
                }@else {
                  <div class="flex items-center justify-between gap-3">

                    <!-- Minus Button -->
                    <button
                      class="bg-white border-1 border-rotaract-cranberry w-14 h-14 rounded-lg font-bold text-xl hover:bg-rotary-azure/90 transition-colors"
                      (click)="orderService.removeFromOrder(product.id!)">
                      −
                    </button>

                    <!-- Quantity Display (groß und prominent) -->
                    <span class="text-3xl font-bold text-rotaract-cranberry min-w-[4rem] text-center">
                      {{ orderService.getQuantity(product.id!) }}
                    </span>

                    <!-- Plus Button -->
                    <button
                      class="bg-rotaract-cranberry text-white w-14 h-14 rounded-lg font-bold text-xl hover:bg-rotaract-cranberry/90 transition-colors"
                      (click)="orderService.addToOrder(product.id!)">
                      +
                    </button>

                  </div>
                }

              </mat-card-content>
            </mat-card>
          }
        }
    </div>
  </main>

  <aside class="lg:col-span-4 bg-white border-l p-4 overflow-y-auto">
    <div>
      <div style="padding: 20px" class="">
        <button matButton class="!bg-rotaract-cranberry" (click)="onSendOrder()">BEZAHLT</button>
      </div>

      <div class="h-full overflow-y-auto">
        <!-- Bestellung Content -->
        <app-order-summary/>
      </div>

    </div>
  </aside>

</div>
