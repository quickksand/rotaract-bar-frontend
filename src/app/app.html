<div class="h-screen grid grid-rows-[auto_1fr] max-w-none">

  <header class="sticky bg-gray-100 border-b py-5">
    <div class="flex justify-between items-center px-5">
      <div class="flex items-center gap-3">
        <a routerLink="/status" class="relative inline-block">
          <img src="rac_logo.svg" alt="" class="h-10 w-auto">
          @if (failedSyncCount() > 0) {
            <span class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-slate-600 text-[10px] font-bold text-white ring-2 ring-white">
              {{ failedSyncCount() }}
            </span>
          }
        </a>
        <span class="text-xl font-bold text-gray-800">Rotaract Bar System</span>
        @if(!isOnline()){
          <a routerLink="/status" class="inline-flex items-center gap-1.5 bg-red-500 text-white text-xs font-bold px-2.5 py-1 rounded-full shadow">
            <span class="relative flex h-2 w-2 shrink-0">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span>
            </span>
            OFFLINE
          </a>
        }
      </div>

      <nav class="flex gap-2">
        <button routerLink="/order"
                routerLinkActive="bg-rotaract-cranberry text-white"
                class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors bg-gray-200 hover:bg-gray-300">
          📋 Bestellung
        </button>

<!--     TODO LEON - Klären, welches Design wir wollen-->
        <!-- Variante A: kleiner Badge
        <button routerLink="/preparation"
                routerLinkActive="bg-rotaract-cranberry text-white"
                class="relative px-4 py-2 rounded-lg text-sm font-semibold transition-colors bg-gray-200 hover:bg-gray-300">
          🍹 Zubereitung
          @if (openOrderCount() > 0) {
            <div class="absolute -top-2 -right-2 bg-rotaract-cranberry text-white ring-2 ring-white rounded-full min-w-[1.25rem] h-5 px-1 flex items-center justify-center font-bold text-xs">
              {{ openOrderCount() }}
            </div>
          }
        </button>
        -->

        <!-- Variante B: großer Badge -->
        <button routerLink="/preparation"
                routerLinkActive="bg-rotaract-cranberry text-white"
                class="relative px-4 py-2 rounded-lg text-sm font-semibold transition-colors bg-gray-200 hover:bg-gray-300">
          🍹 Zubereitung
          @if (openOrderCount() > 0) {
            <div class="absolute -top-3.5 -right-3.5 bg-rotaract-cranberry text-white ring-[3px] ring-white rounded-full min-w-[2rem] h-8 px-1.5 flex items-center justify-center font-black text-base shadow-md">
              {{ openOrderCount() }}
            </div>
          }
        </button>
      </nav>
    </div>
  </header>

  <div class="overflow-hidden min-h-0 relative">
    @if (productsLoadFailed()) {
      <div class="absolute inset-0 flex flex-col">
        <img src="jaeger-exit.png" alt="" class="absolute inset-0 w-full h-full object-cover">
        <div class="relative flex flex-1 items-center justify-center p-6">
          <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center">
            <div class="text-5xl mb-4">📡</div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Keine Verbindung</h2>
            <p class="text-gray-600 text-sm leading-relaxed mb-6">
              Server nicht erreichbar und kein lokaler Cache vorhanden.<br>
              Bitte Backend starten und neu laden.
            </p>
            <button (click)="reload()"
                    class="px-6 py-2.5 bg-rotaract-cranberry text-white font-semibold rounded-lg hover:opacity-90 transition-opacity">
              Neu laden
            </button>
          </div>
        </div>
      </div>
    } @else {
      <router-outlet></router-outlet>
    }
  </div>

</div>
