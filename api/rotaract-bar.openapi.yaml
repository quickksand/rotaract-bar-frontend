openapi: 3.0.3
info:
  title: OpenAPI definition
  version: 1.2.0
servers:
  - url: http://localhost:8080
    description: Generated server url
paths:
  /api/orders:
    get:
      tags:
        - purchase-order-controller
      summary: Get all orders
      description: This endpoint gets all currently saved orders
      operationId: getOrders
      responses:
        "200":
          description: Successful
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
    post:
      tags:
        - purchase-order-controller
      summary: Create new Order
      description: This endpoint creates a new purchase order
      operationId: createOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrder"
        required: true
      responses:
        "201":
          description: Successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Bad request - Invalid details provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
  /api/products:
    get:
      tags:
        - product-controller
      operationId: getProducts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
  /api/products/meta:
    get:
      tags:
        - product-controller
      operationId: getProductsMeta
      summary: Get product metadata including the last price update timestamp
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsMeta"
  /api/products/{id}:
    patch:
      tags:
        - product-controller
      operationId: updateProduct
      summary: Update price and/or stock status of a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
  /api/ingredients:
    get:
      tags:
        - ingredient-controller
      operationId: getIngredients
      summary: "Get all ingredients"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
  /api/orders/batch:
    post:
      tags:
        - purchase-order-controller
      summary: Batch import orders
      description: Imports multiple purchase orders in a single request. Orders that fail validation are skipped and reported in the errors list.
      operationId: importOrdersBatch
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchOrderImport"
        required: true
      responses:
        "207":
          description: Multi-status — contains created orders and any import errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchOrderResult"
        "400":
          description: Bad request - request body is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchOrderResult"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchOrderResult"
  /api/orders/{id}:
    get:
      tags:
        - purchase-order-controller
      summary: Get Order by id
      description: This endpoint gets all orders by provided id
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Bad request - Invalid id provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
components:
  schemas:
    OrderedItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
          minimum: 1
        bottleSale:
          type: boolean
          default: false
          description: "Marks this item as a bottle sale for analytics"
        customPrice:
          type: number
          format: double
          minimum: 0
          description: "Negotiated price for bottle sales; overrides quantity × product price in totals"
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        price:
          type: number
          format: double
        category:
          type: string
          enum:
            - DRINKS
            - BEER_WINE_NONALC
            - SHOTS
          description: "Product category for bar organization"
        ingredientIds:
          type: array
          items:
            type: integer
            format: int64
          description: "List of ingredient IDs for this product"
        outOfStock:
          type: boolean
          default: false
          description: "When true, the product is hidden from the order view"
      required:
        - id
        - name
        - price
        - category
    Ingredient:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      required:
        - id
        - name
    PurchaseOrder:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderedItem"
        returnedCupsCount:
          type: integer
          format: int32
          minimum: 0
        tipAmount:
          type: number
          format: double
          minimum: 0
          description: "Optional tip amount in EUR"
        paymentMethod:
          type: string
          enum: [ CASH, PAYPAL ]
          description: "Payment method used for this order"
        freeDrinksEarned:
          type: integer
          format: int32
          minimum: 0
          description: "Number of free drinks earned via stamp card in this order"
        freeDrinkDiscount:
          type: number
          format: double
          minimum: 0
          description: "Free drink discount applied via stamp card in EUR"
    BatchOrderImport:
      type: object
      required:
        - orders
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrder"
          minItems: 1
    BatchOrderResult:
      type: object
      properties:
        created:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrder"
          description: "Successfully imported orders"
        errors:
          type: array
          items:
            type: string
          description: "Error messages for orders that could not be imported"
    ProductsMeta:
      type: object
      required:
        - productsUpdatedAt
      properties:
        productsUpdatedAt:
          type: string
          format: date-time
          description: "Timestamp of the last change to any product (price or stock status)"
    UpdateProductRequest:
      type: object
      properties:
        price:
          type: number
          format: double
          minimum: 0
          description: "New price for the product"
        outOfStock:
          type: boolean
          description: "New stock status for the product"
